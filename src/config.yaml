site:
  name: CreateCraft
  site: 'https://mc.540881.xyz'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: CreateCraft
    template: '%s — CreateCraft'
  description: "CreateCraft服务器官方网站"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: CreateCraft
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/posts/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'posts' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: false
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

ui:
  theme: 'light' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
